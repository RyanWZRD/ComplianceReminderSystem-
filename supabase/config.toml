# Supabase local development configuration (v3.0.0 Alpha Phase 1)
# See docs/cloud-setup.md for linking to a remote staging project.

project_id = "compliance-reminder-system"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:8877"
additional_redirect_urls = ["http://127.0.0.1:8877", "http://127.0.0.1:8877/?backend=cloud"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
